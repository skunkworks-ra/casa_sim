name: sim_scubed_fullpol

observatory:
  mode: canned
  feeds: "perfect R L"
  canned:
    telescope: VLA
    cfg_file: "vla.b.cfg"
    antlist: null

observation:
  epoch: "UTC 2020/10/4/00:00:00"
  integration_time: "600s"
  use_hourangle: true
  fields:
    - name: scubed_field
      direction: "J2000 19h59m28.5s +40d40m00.0s"
  spws:
    - name: LBand
      freq: "1.0GHz"
      deltafreq: "0.5GHz"
      nchan: 16
      stokes: "RR RL LR LL"
  observe_calls:
    - field: scubed_field
      spw: LBand
      start_time: "-4.0h"
      stop_time: "+4.0h"

sky_model:
  stokes: IQUV
  mode: component_list
  sources_file: "../scubed_sources.yaml"
  flux_cutoff: 1.0e-5

prediction:
  gridder: standard
  predictor: sm_predict
  cell: "1.0arcsec"
  imsize: 2048
  normtype: flatsky

corruption:
  seed: 42
  noise:
    enabled: true
    mode: simplenoise
    value: "0.001Jy"
  gains:
    enabled: false
    mode: fbm
    amplitude: 0.0

imaging:
  enabled: true
  deconvolver: hogbom
  pbcor: false
  niter: 1000
