name: sim_sources_file_test

observatory:
  mode: canned
  feeds: "perfect R L"
  canned:
    telescope: VLA
    cfg_file: null
    antlist: null

observation:
  epoch: "UTC 2020/10/4/00:00:00"
  integration_time: "2000s"
  use_hourangle: true
  fields:
    - name: field1
      direction: "J2000 19h59m28.5s +40d40m00.0s"
  spws:
    - name: LBand
      freq: "1.0GHz"
      deltafreq: "0.05GHz"
      nchan: 10
      stokes: "RR RL LR LL"
  observe_calls:
    - field: field1
      spw: LBand
      start_time: "-5.0h"
      stop_time: "+5.0h"

sky_model:
  stokes: IQUV
  mode: component_list
  sources_file: "../../scubed_sources.yaml"
  flux_cutoff: 1.0e-4

prediction:
  gridder: standard
  predictor: sm_predict
  cell: null
  imsize: null
  normtype: flatsky

corruption:
  seed: 42
  noise:
    enabled: true
    mode: simplenoise
    value: "0.01Jy"
  gains:
    enabled: false
    mode: fbm
    amplitude: 0.0

imaging:
  enabled: true
  deconvolver: hogbom
  pbcor: false
  niter: 500
