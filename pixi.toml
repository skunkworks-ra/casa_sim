[workspace]
name        = "casa_sim"
version     = "0.1.0"
description = "CASA-based radio interferometry simulation framework"
channels    = ["conda-forge"]
platforms   = ["linux-64"]

[dependencies]
python     = ">=3.12,<3.13"
pip        = ">=24"
setuptools = ">=75"
numpy      = ">=1.26"
astropy    = ">=6.0"
pyyaml     = ">=6.0"
scipy      = ">=1.12"
pillow     = ">=10.0"
matplotlib = ">=3.8"

[pypi-dependencies]
casa-sim   = { path = ".", editable = true }
casatools  = ">=6.6"
casatasks  = ">=6.6"
pytest     = ">=8.0"

[tasks]
simulate     = { cmd = "python simulate.py" }
test         = { cmd = "python tests/run_all.py" }
test-3c286   = { cmd = "python tests/integration/test_3c286.py" }
test-vla     = { cmd = "python tests/integration/test_vla_basic.py" }
pytest-all   = { cmd = "pytest tests/ -v" }
pytest-casa  = { cmd = "pytest tests/ -m casa -v" }
pytest-fast  = { cmd = "pytest tests/ -m 'not casa' -v" }
fetch-trecs  = { cmd = "python tools/fetch_trecs.py" }
build-morphology = { cmd = "python -c \"from casa_sim.skymodel.morphology_templates import build_template_library; build_template_library('.')\"" }
